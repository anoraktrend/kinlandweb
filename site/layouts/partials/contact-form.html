<!-- Contact -->
<div class="mb4">
  <h4 class="f3 b lh-title mb3 tc">Drop us a line below</h4>

  <form id="contact-form">
    <div class="flex-l mhn1-l">
      <!-- Name -->
      <div class="ph1-l w-50-l">
        <fieldset>
          <input type="text" id="name" name="name" placeholder="Name" class="w-100 mb2" required>
          <label for="name">Name</label>
        </fieldset>
      </div>
      <!-- Email -->
      <div class="ph1-l w-50-l">
        <fieldset>
          <input type="email" id="email" name="email" placeholder="Email" class="w-100 mb2" required>
          <label for="email">Email</label>
        </fieldset>
      </div>
    </div>

    <!-- Message -->
    <fieldset>
      <textarea id="message" name="message" placeholder="Your message" rows="8" cols="80" class="w-100" required></textarea>
      <label for="message">Your message</label>
    </fieldset>
    <!-- Button -->
    <div class="tc">
      <button type="submit" id="submit-button" class="btn w-100 w-auto-ns raise">Submit</button>
    </div>
    <div id="form-status" class="mt3 tc"></div>
  </form>
</div>

<script>
  const form = document.getElementById("contact-form");
  const status = document.getElementById("form-status");
  const button = document.getElementById("submit-button");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    button.disabled = true;
    button.textContent = "Sending...";
    status.textContent = "";

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    try {
      const response = await fetch("/api/contact", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(data),
      });

      if (response.ok) {
        status.textContent = "Thanks! Your message has been sent.";
        status.className = "mt3 tc dark-green";
        form.reset();
      } else {
        const errData = await response.json();
        status.textContent = "Oops! " + (errData.error || "Something went wrong.");
        status.className = "mt3 tc red";
      }
    } catch (error) {
      status.textContent = "Oops! Connection error.";
      status.className = "mt3 tc red";
    } finally {
      button.disabled = false;
      button.textContent = "Submit";
    }
  });
</script>

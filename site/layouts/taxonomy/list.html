{{ define "main" }}
<div class="mw6 center ph3 pv4">
  <h1 class="f2 lh-title b mb3">{{ .Title }}</h1>
  <div class="cms mw6">
    {{ .Content }}
  </div>
  <ul>
    {{ range .Data.Terms.ByCount }}
    <li>
      <a href="{{ .Permalink }}">{{ .LinkTitle }}</a> ({{ .Count }})
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}

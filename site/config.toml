baseurl = "https://kinland.helltop.net/"
languageCode = "en-us"
languageLang = "en"
title = "Homepage"

# RSS, categories and tags disabled for an easy start
# See configuration options for more details: 
# https://gohugo.io/getting-started/configuration/#toml-configuration
disableKinds = []

# Cloudflare Pages specific settings
publishDir = "public"

# Performance and optimization settings for Cloudflare
enableGitInfo = true
enableRobotsTXT = true
enableSitemap = true

# Minification settings
[minify]
  minifyOutput = true

# Security settings for environment variables
[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^CONTEXT$', '^URL$', '^DEPLOY_PRIME_URL$']

# Image processing settings
# Use Cloudflare Images for better performance
enableImageProcessing = true

# Security headers
enableHugoBin = true

# Build settings
buildDrafts = false
buildFuture = false
buildExpired = false

# Output formats
[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Media types
[mediaTypes]
  [mediaTypes."text/html"]
    suffixes = ["html", "htm"]

# Output formats
[outputFormats]
  [outputFormats.HTML]
    mediaType = "text/html"
    baseName = "index"
    isPlainText = false
    notAlternative = true
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "index"
    isPlainText = false
    notAlternative = true
